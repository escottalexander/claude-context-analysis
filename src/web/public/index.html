<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Code Session Explorer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left">
        <h1>Claude Code Session Explorer</h1>
      </div>
      <div class="topbar-nav">
        <button
          id="session-modal-trigger"
          class="session-trigger-btn"
          aria-haspopup="dialog"
          aria-controls="session-modal"
          title="Choose session"
        >
          <span class="session-trigger-label">Session</span>
          <span id="session-current-label" class="session-current-label">Loading...</span>
        </button>
        <button id="session-copy-btn" class="session-copy-btn" title="Copy session ID" aria-label="Copy session ID">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
      </div>
    </header>
    <main>
      <div id="app">Loading...</div>
    </main>
    <div id="session-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="session-modal-title">
      <div id="session-modal-backdrop" class="modal-backdrop"></div>
      <div class="modal-panel">
        <div class="modal-header">
          <h2 id="session-modal-title">Choose Session</h2>
          <button id="session-modal-close" class="modal-close-btn" aria-label="Close session chooser">×</button>
        </div>
        <div class="modal-content">
          <div class="session-search-wrap">
            <input
              id="session-modal-search"
              class="session-search-input"
              type="text"
              placeholder="Search sessions by project, file, prompt..."
              aria-label="Search sessions"
            />
          </div>
          <div id="session-modal-list" class="session-modal-list"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
